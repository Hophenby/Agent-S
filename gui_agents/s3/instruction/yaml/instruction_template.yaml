name: "<INSTRUCTION_WORKFLOW_NAME>"

metadata:
  title: "<GUIDE_TITLE>"
  software:
    name: "<SOFTWARE_NAME>"
    version: "<SOFTWARE_VERSION>"
  language: "zh-CN"
  source_markdown: "<OPTIONAL_SOURCE_MARKDOWN_PATH>" # e.g. ../example_instruction.md
  author: "<OPTIONAL_AUTHOR>"
  updated_at: "<YYYY-MM-DD>"

on:
  workflow_dispatch:

jobs:
  instruction_flow:
    name: "<FLOW_NAME>"
    runs-on: "human-desktop"
    steps:
      - id: "step_1"
        name: "<STEP_NAME>"
        description: "<STEP_DESCRIPTION>"
        action:
          - "<NATURAL_LANGUAGE_ACTION>"
        actions:
          mouse_input:
            - button: "left" # left | right | middle | back | forward
              action: "click" # click | double_click | press | release | long_press
              clicks: 1
              duration_ms: 0
              position: null # or { x: 100, y: 200 }
              target: "<OPTIONAL_UI_TARGET>"
              modifiers: []
          key_input: []
          text_input: []
          scroll_input: []
          drag_drop: []
          hover_input: []
          window_input: []
          file_input: []
          clipboard_input: []
          wait: []
          special: []
        images:
          step_image: "<OPTIONAL_STEP_IMAGE_PATH_OR_NULL>"
          result_image: "<LEGACY_SINGLE_RESULT_IMAGE_OR_NULL>" # legacy shortcut; prefer postconditions
        template_matching:
          threshold: 0.8
          min_scale: 0.9
          max_scale: 1.1
          scale_step: 0.05
          # scales: [0.9, 1.0, 1.1]
        element_text: "<OPTIONAL_TEXT_FOR_OCR_LOCATE>"
        postconditions:
          - id: "<POSTCONDITION_ID>"
            result_image: "<OPTIONAL_RESULT_IMAGE_PATH_OR_NULL>"
            expected_text: "<OPTIONAL_TEXT_EXPECTED_IN_OCR>"
            description: "<OPTIONAL_DESCRIPTION>"
          - id: "<ALTERNATE_POSTCONDITION_ID>"
            result_image: null
            expected_text: "<ALTERNATE_EXPECTED_TEXT>"
        transitions:
          - when:
              status: "success" # success | precondition_failed | no_postcondition_matched | ambiguous_postcondition | execution_error | failure
              matched_postcondition: "<POSTCONDITION_ID>"
            goto: "<NEXT_STEP_ID>"
          - when:
              status: "no_postcondition_matched"
            goto: "<RECOVERY_STEP_ID>"
          - else: true
            goto: "<DEFAULT_FALLBACK_STEP_ID>"
        on_success: "<NEXT_STEP_ID>" # optional minimal fallback when transitions are omitted
        on_failure: "<FALLBACK_STEP_ID>" # optional minimal fallback when transitions are omitted
        pre_processing_delay_millisec: 50
        post_processing_delay_millisec: 50
        expected_result: "<LEGACY_EXPECTED_RESULT_TEXT>" # legacy shortcut; prefer postconditions[].expected_text
        timeout_sec: 120
        retry: 0

      - id: "done"
        name: "Done"
        description: "<FINAL_SUMMARY>"
        action:
          - "<POST_ACTION_OR_NEXT_STEP>"
        actions: null
        images:
          step_image: null
          result_image: null
        timeout_sec: 30
        retry: 0

# Authoring notes:
# 1) Recommended step semantics:
#    Locate(step_image / element_text) -> Act(actions) -> Postconditions -> Transitions
# 2) postconditions is the preferred model for branching. It describes the valid UI states after the action.
# 3) transitions are evaluated in order. The first matching branch wins. else: true is the default fallback branch.
# 4) on_success / on_failure remain available for minimal branching, but transitions take precedence.
# 5) images.result_image + expected_result is a legacy single-outcome shorthand. The runner treats it as one implicit postcondition with id=default.
# 6) status: failure is an alias that matches any failure-like outcome, including precondition_failed, no_postcondition_matched, ambiguous_postcondition, and execution_error.
