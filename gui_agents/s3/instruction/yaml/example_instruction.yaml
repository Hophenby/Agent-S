name: "EndNote FindFullText Instruction"

metadata:
  title: "EndNote usage guide: Find Full Text"
  software:
    name: "EndNote"
    version: "2024"
  language: "zh-CN"
  source_markdown: "../example_instruction.md"

on:
  workflow_dispatch:

jobs:
  instruction_flow:
    name: "FindFullText flow"
    runs-on: "human-desktop"
    steps:
      - id: "step_1_open_app"
        name: "Open EndNote"
        description: "Launch EndNote and wait until the main window is visible."
        action:
          - "Open EndNote from the desktop or Start menu."
        actions: null
        images:
          step_image: null
          result_image: "./test_images/step1.png"
        expected_result: "EndNote"
        on_success: "step_2_click_references"
        timeout_sec: 120
        retry: 0

      - id: "step_2_click_references"
        name: "Open References Menu"
        description: "Click the References menu in the top menu bar."
        action:
          - "Click References in the top menu."
        actions:
          mouse_input:
            - button: "left"
              action: "click"
              clicks: 1
              position: null
              target: "References menu"
              modifiers: []
          key_input: []
          text_input: []
          scroll_input: []
          drag_drop: []
          hover_input: []
          window_input: []
          file_input: []
          clipboard_input: []
          wait: []
          special: []
        images:
          step_image: "./test_images/step2.png"
          result_image: "./test_images/step2_r.png"
        template_matching:
          min_scale: 0.9
          max_scale: 1.1
          scale_step: 0.05
        element_text: "References"
        expected_result: "Find Full Text"
        on_success: "step_3_find_full_text"
        timeout_sec: 120
        retry: 0

      - id: "step_3_find_full_text"
        name: "Open Find Full Text Submenu"
        description: "After the References menu opens, select the Find Full Text submenu."
        action:
          - "Click Find Full Text in the References dropdown menu."
        actions:
          mouse_input:
            - button: "left"
              action: "click"
              clicks: 1
              position: null
              target: "Find Full Text menu item"
              modifiers: []
          key_input: []
          text_input: []
          scroll_input: []
          drag_drop: []
          hover_input: []
          window_input: []
          file_input: []
          clipboard_input: []
          wait: []
          special: []
        images:
          step_image: "./test_images/step3.png"
          result_image: null
        template_matching:
          min_scale: 0.9
          max_scale: 1.1
          scale_step: 0.05
        element_text: "Find Full Text"
        postconditions:
          - id: "submenu_visible"
            result_image: "./test_images/step3_1a.png"
            expected_text: "Find Full Text"
            description: "The submenu expands successfully."
        transitions:
          - label: "submenu visible"
            when:
              status: "success"
              matched_postcondition: "submenu_visible"
            goto: "step_31_find_full_text"
          - label: "retry from references"
            when:
              status: "no_postcondition_matched"
            goto: "step_2_click_references"
          - label: "ambiguous menu state"
            when:
              status: "ambiguous_postcondition"
            goto: "step_2_click_references"
          - else: true
            goto: "step_2_click_references"
        timeout_sec: 120
        retry: 0

      - id: "step_31_find_full_text"
        name: "Run Find Full Text"
        description: "Choose the final Find Full Text command from the submenu."
        action:
          - "Click the Find Full Text command in the submenu."
        actions:
          mouse_input:
            - button: "left"
              action: "click"
              clicks: 1
              position: null
              target: "Find Full Text submenu item"
              modifiers: []
          key_input: []
          text_input: []
          scroll_input: []
          drag_drop: []
          hover_input: []
          window_input: []
          file_input: []
          clipboard_input: []
          wait: []
          special: []
        images:
          step_image: "./test_images/step3_1.png"
          result_image: null
        template_matching:
          min_scale: 0.9
          max_scale: 1.1
          scale_step: 0.05
        element_text: "Find Full Text"
        postconditions:
          - id: "progress_started"
            result_image: "./test_images/step4.png"
            description: "The left progress panel appears."
        transitions:
          - when:
              status: "success"
              matched_postcondition: "progress_started"
            goto: "step_4_check_progress"
          - when:
              status: "failure"
            goto: "step_2_click_references"
        timeout_sec: 120
        retry: 0

      - id: "step_4_check_progress"
        name: "Verify Progress Panel"
        description: "Confirm that the Find Full Text progress UI is visible."
        action:
          - "Observe the left panel and verify that progress is visible."
        actions: null
        images:
          step_image: null
          result_image: "./test_images/step4.png"
        expected_result: "Find Full Text"
        on_success: "done"
        timeout_sec: 120
        retry: 0

      - id: "done"
        name: "Done"
        description: "The workflow has successfully reached the progress state."
        action:
          - "Wait for EndNote to continue processing."
        actions: null
        images:
          step_image: null
          result_image: null
        timeout_sec: 30
        retry: 0
